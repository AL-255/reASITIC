name: docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one in-flight Pages deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system build deps
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y build-essential

      - name: Install package + docs dependencies
        run: |
          python -m pip install --upgrade pip
          # The wheel includes the Cython extension; installing it
          # means Sphinx's autodoc can introspect the compiled
          # kernel module directly.
          python -m pip install .
          python -m pip install -r docs/requirements.txt

      - name: Build HTML docs
        run: |
          sphinx-build -b html -W --keep-going docs docs/_build/html

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
